version: '3.8'

services:
  # MongoDB Main Instance
  mongodb:
    image: mongo:7.0
    container_name: optik-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${OPTIK_MONGO_ROOT_USER:?Set OPTIK_MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${OPTIK_MONGO_ROOT_PASSWORD:?Set OPTIK_MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: optik
      OPTIK_MONGO_APP_USER: ${OPTIK_MONGO_APP_USER:?Set OPTIK_MONGO_APP_USER}
      OPTIK_MONGO_APP_PASSWORD: ${OPTIK_MONGO_APP_PASSWORD:?Set OPTIK_MONGO_APP_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - optik-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Express UI (Optional - for local development only)
  mongo-express:
    image: mongo-express:latest
    container_name: optik-mongo-express
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${OPTIK_MONGO_ROOT_USER:?Set OPTIK_MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${OPTIK_MONGO_ROOT_PASSWORD:?Set OPTIK_MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${OPTIK_MONGO_ROOT_USER}:${OPTIK_MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${OPTIK_MONGO_ROOT_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${OPTIK_MONGO_ROOT_PASSWORD:-changeme123}
    depends_on:
      - mongodb
    networks:
      - optik-network
    profiles:
      - dev  # Only run with: docker-compose -f docker-compose.mongodb.yml --profile dev up

  # Redis Cache (Recommended)
  redis:
    image: redis:7-alpine
    container_name: optik-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - optik-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optik Backend API
  optik-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optik-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # MongoDB Configuration
      MONGODB_URL: mongodb://${OPTIK_MONGO_ROOT_USER}:${OPTIK_MONGO_ROOT_PASSWORD}@mongodb:27017/optik?authSource=admin
      MONGODB_DB_NAME: optik
      MONGODB_MAX_POOL_SIZE: 50
      MONGODB_MIN_POOL_SIZE: 10

      # Server Configuration
      PORT: 8000
      HOST: 0.0.0.0
      DEBUG: "False"

      # Redis Configuration
      REDIS_URL: redis://redis:6379

      # API Keys (Use secrets in production!)
      # ANTHROPIC_API_KEY: sk-ant-...
      # STRIPE_SECRET_KEY: sk_test_...

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/venv
    networks:
      - optik-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  optik-network:
    driver: bridge
