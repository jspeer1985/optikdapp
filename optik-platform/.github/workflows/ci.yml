name: enterprise-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  enterprise-ci:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPTIK_AI_FILE_MODEL: ${{ secrets.OPTIK_AI_FILE_MODEL }}
      OPTIK_AI_SUPERVISOR_MODEL: ${{ secrets.OPTIK_AI_SUPERVISOR_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: apps/.nvmrc
          cache: npm
          cache-dependency-path: apps/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Frontend install
        working-directory: apps
        run: npm ci

      - name: Frontend lint
        working-directory: apps
        run: npm run lint

      - name: Frontend build
        working-directory: apps
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
          NEXT_PUBLIC_STRIPE_PUBLIC_KEY: pk_test_ci
          NEXT_PUBLIC_SOLANA_NETWORK: devnet
          NEXT_PUBLIC_RPC_ENDPOINT: https://api.devnet.solana.com
          NEXT_PUBLIC_PLATFORM_WALLET: 11111111111111111111111111111111
          NEXT_PUBLIC_OPTIK_TOKEN_MINT: 11111111111111111111111111111111
          NEXT_PUBLIC_STORE_NFT_MINT: 11111111111111111111111111111111
        run: npm run build

      - name: Backend deps
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Backend tests
        working-directory: backend
        run: pytest

      - name: Security audit (npm)
        working-directory: apps
        run: npm audit --production --audit-level=high

      - name: Security audit (pip)
        run: |
          python -m pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Generate agent registry
        working-directory: apps
        run: python3 scripts/agent_dispatch.py --write

      - name: Run AI pipeline
        working-directory: apps
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse HEAD~1)"
          fi
          changed=$(git diff --name-only --relative "$base" "${{ github.sha }}" | tr '\n' ',' | sed 's/,$//')
          python3 scripts/ai_pipeline.py --targets "$changed"

      - name: Proof audit
        working-directory: apps
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse HEAD~1)"
          fi
          changed=$(git diff --name-only --relative "$base" "${{ github.sha }}" | tr '\n' ',' | sed 's/,$//')
          python3 scripts/proof_audit.py --targets "$changed" --workflow agents/workflows/ai_pipeline.json

      - name: Upload proof bundle
        uses: actions/upload-artifact@v4
        with:
          name: ai-proof-bundle
          path: apps/audit/proofs
